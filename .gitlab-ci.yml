stages:
  - verify
  - build

default:
  image: oven/bun:1.3.12
  before_script:
    - bun install --frozen-lockfile

cache:
  key:
    files:
      - bun.lock
  paths:
    - node_modules/
    - /root/.bun/install/cache
  policy: pull-push

lint:
  stage: verify
  script:
    - bun run lint

format:
  stage: verify
  script:
    - bun run format:check

build:
  stage: build
  script:
    - bun run build
  artifacts:
    when: on_success
    paths:
      - dist/

